<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 90" width="460" height="90">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0a04b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e06b30;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3dd9c5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ab8a6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0a04b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3dd9c5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon mark -->
  <g transform="translate(8, 8)">
    <polygon points="37,2 62,16 62,44 37,58 12,44 12,16"
             fill="none" stroke="url(#iconGrad)" stroke-width="1.2" opacity="0.25"/>
    <line x1="37" y1="12" x2="24" y2="30" stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.6"/>
    <line x1="37" y1="12" x2="50" y2="30" stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.6"/>
    <line x1="24" y1="30" x2="37" y2="48" stroke="url(#tealGrad)" stroke-width="1.2" opacity="0.6"/>
    <line x1="50" y1="30" x2="37" y2="48" stroke="url(#tealGrad)" stroke-width="1.2" opacity="0.6"/>
    <line x1="24" y1="30" x2="50" y2="30" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
    <circle cx="37" cy="12" r="4.5" fill="url(#accentGrad)" filter="url(#glow)"/>
    <circle cx="37" cy="12" r="2" fill="#fff" opacity="0.9"/>
    <circle cx="24" cy="30" r="3.5" fill="url(#accentGrad)" opacity="0.85"/>
    <circle cx="24" cy="30" r="1.8" fill="#fff" opacity="0.8"/>
    <circle cx="50" cy="30" r="3.5" fill="url(#tealGrad)" opacity="0.85"/>
    <circle cx="50" cy="30" r="1.8" fill="#fff" opacity="0.8"/>
    <circle cx="37" cy="48" r="4.5" fill="url(#tealGrad)" filter="url(#glow)"/>
    <circle cx="37" cy="48" r="2" fill="#fff" opacity="0.9"/>
    <circle cx="37" cy="30" r="5.5" fill="url(#iconGrad)" filter="url(#glow)"/>
    <circle cx="37" cy="30" r="2.5" fill="#fff" opacity="0.95"/>
  </g>

  <!-- Think -->
  <text x="82" y="42"
        font-family="'Outfit', 'Segoe UI', Arial, sans-serif"
        font-size="32" font-weight="700" letter-spacing="-0.5"
        fill="#e8eaf0">Think</text>

  <!-- Labs -->
  <text x="178" y="42"
        font-family="'Outfit', 'Segoe UI', Arial, sans-serif"
        font-size="32" font-weight="700" letter-spacing="-0.5"
        fill="url(#accentGrad)">Labs</text>

  <!-- AI -->
  <text x="252" y="42"
        font-family="'Outfit', 'Segoe UI', Arial, sans-serif"
        font-size="32" font-weight="300" letter-spacing="2"
        fill="url(#tealGrad)"> AI</text>

  <!-- SOLUTIONS tagline -->
  <text x="83" y="62"
        font-family="'Outfit', 'Segoe UI', Arial, sans-serif"
        font-size="10" font-weight="400" letter-spacing="4"
        fill="#8892a4">SOLUTIONS</text>

  <!-- Accent line -->
  <line x1="83" y1="67" x2="180" y2="67"
        stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.45"/>
</svg>
